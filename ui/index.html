          {
            ...video,
            watchedAt: new Date().toISOString(),
          },
          ...watchHistory.filter((item) => item.id !== video.id),
        ].slice(0, 80);
        saveStoredList(storageNames.watchHistory, watchHistory);
      }

      function toggleSubscription(video) {
        const channelId = video?.channelId;
        if (!channelId) {
          setStatus("This video does not include a channel id.", true);
          return;
        }

        if (isSubscribed(video)) {
          subscriptions = subscriptions.filter((item) => item.channelId !== channelId);
          setStatus("Removed from subscriptions.");
        } else {
          upsertSubscription(subscriptionFromVideo(video));
          setStatus("Subscribed.");
        }
        saveStoredList(storageNames.subscriptions, subscriptions);
      }

      function upsertSubscription(subscription) {
        if (!subscription.channelId) return;
        subscriptions = [
          subscription,
          ...subscriptions.filter((item) => item.channelId !== subscription.channelId),
        ].slice(0, 80);
        saveStoredList(storageNames.subscriptions, subscriptions);
      }

      function subscriptionFromVideo(video) {
        return {
          channelId: video.channelId || "",
          title: video.channel || "YouTube",
          thumbnail: video.channelThumbnail || "",
          subscriberCount: video.subscriberCount || 0,
          subscribedAt: new Date().toISOString(),
        };
      }

      function isSubscribed(video) {
        return Boolean(video?.channelId && subscriptions.some((item) => item.channelId === video.channelId));
      }

      function renderSubscribeState(video) {
        const subscribed = isSubscribed(video);
        subscribeButton.disabled = !video?.channelId;
        subscribeButton.classList.toggle("is-subscribed", subscribed);
        subscribeButton.textContent = subscribed ? "Subscribed" : "Subscribe";
      }

      async function hydrateVideoDetails(items, key) {
        const ids = items.map((item) => item.id?.videoId).filter(Boolean);
        if (!ids.length) return [];

        const fallback = items.map((item) => videoFromSearchItem(item));

        try {
          const url = new URL("https://www.googleapis.com/youtube/v3/videos");
          url.search = new URLSearchParams({
            part: "snippet,contentDetails,statistics",
            id: ids.join(","),
            key,
          }).toString();

          const payload = await fetchJson(url);
          const detailsById = new Map((payload.items || []).map((item) => [item.id, item]));
          return fallback.map((video) => {
            const details = detailsById.get(video.id);
            return details ? videoFromDetails(details, video) : video;
          });
        } catch {
          return fallback;
        }
      }

      async function fetchJson(url, options = {}) {
        const response = await fetch(url, options);
        const payload = await response.json().catch(() => null);

        if (!response.ok) {
          const detail = payload?.error?.message || payload?.detail || `${response.status} ${response.statusText}`;
          throw new Error(detail);
        }

        return payload || {};
      }

      async function openVideoFromId(videoId, options = {}) {
        const youtubeKey = youtubeKeyInput.value.trim();
        if (!youtubeKey) {
          showFeedPage({ updateHistory: false });
          setStatus("YouTube API key is required to open a video.", true);
          return;
        }

        try {
          const video = currentVideos.find((item) => item.id === videoId) || await fetchVideoById(videoId, youtubeKey);
          openWatchPage(video, options);
        } catch (error) {
          showFeedPage({ updateHistory: false });
          setStatus(error.message, true);
        }
      }

      async function fetchVideoById(videoId, key) {
        const url = new URL("https://www.googleapis.com/youtube/v3/videos");
        url.search = new URLSearchParams({
          part: "snippet,contentDetails,statistics",
          id: videoId,
          key,
        }).toString();

        const payload = await fetchJson(url);
        const item = payload.items?.[0];
        if (!item) throw new Error("Video not found.");
        return videoFromDetails(item, {
          id: videoId,
          title: "Untitled video",
          channel: "",
          publishedAt: "",
          thumbnail: "",
          url: youtubeUrl(videoId),
        });
      }

      function renderResults(videos) {
        if (!videos.length) {
          resultsEl.innerHTML = `<div class="empty">No videos found.</div>`;
          return;
        }

        const fragment = document.createDocumentFragment();
        const chunkSize = videosPerThreeRows();

        for (let index = 0; index < videos.length; index += chunkSize) {
          const chunk = videos.slice(index, index + chunkSize);
          const grid = document.createElement("section");
          grid.className = "video-grid-block";
          grid.setAttribute("aria-label", "Videos");

          for (const video of chunk) {
            grid.append(videoCard(video));
          }
          fragment.append(grid);

          if (chunk.length === chunkSize) {
            fragment.append(shortsStrip(shortsForChunk(videos, index, chunkSize)));
          }
        }

        resultsEl.replaceChildren(fragment);
      }

      function shortsStrip(videos) {
        const section = document.createElement("section");
        section.className = "shorts-section";
        section.setAttribute("aria-label", "Shorts");

        const heading = document.createElement("h2");
        heading.className = "section-heading";
        heading.innerHTML = `<span class="shorts-mark">▶</span><span>Shorts</span>`;

        const grid = document.createElement("div");
        grid.className = "shorts-grid";

        if (!videos.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No shorts preview.";
          grid.append(empty);
        } else {
          for (const video of videos) {
            grid.append(shortCard(video));
          }
        }

        section.append(heading, grid);
        return section;
      }

      function shortCard(video) {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "short-card";
        card.addEventListener("click", () => selectVideo(video));

        const thumb = document.createElement("div");
        thumb.className = "short-thumb";
        if (video.thumbnail) {
          const img = document.createElement("img");
          img.src = video.thumbnail;
          img.alt = "";
          img.loading = "lazy";
          thumb.append(img);
        }

        const title = document.createElement("p");
        title.className = "short-title";
        title.textContent = video.title;

        const meta = document.createElement("div");
        meta.className = "short-meta";
        meta.textContent = video.viewCount ? `${formatNumber(video.viewCount)} views` : video.channel;

        card.append(thumb, title, meta);
        return card;
      }

      function shortsForChunk(videos, start, chunkSize) {
        const next = videos.slice(start + chunkSize, start + chunkSize + 5);
        const current = videos.slice(start, start + Math.min(5, chunkSize));
        return dedupeVideos([...next, ...current]).slice(0, 5);
      }

      function videosPerThreeRows() {
        if (window.matchMedia("(max-width: 720px)").matches) return 3;
        if (window.matchMedia("(max-width: 980px)").matches) return 6;
        return 9;
      }

      function videoCard(video) {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "video-card";
        card.addEventListener("click", () => selectVideo(video));

        const thumb = document.createElement("div");
        thumb.className = "thumb";

        if (video.thumbnail) {
          const img = document.createElement("img");
          img.src = video.thumbnail;
          img.alt = "";
          img.loading = "lazy";
          thumb.append(img);
        }

        if (video.duration) {
          const duration = document.createElement("span");
          duration.className = "duration";
          duration.textContent = formatDuration(video.duration);
          thumb.append(duration);
        }

        const info = document.createElement("div");
        info.className = "video-info";

        const avatar = document.createElement("span");
        avatar.className = "avatar";
        avatar.textContent = initials(video.channel);

        const body = document.createElement("div");
        const title = document.createElement("h2");
        title.className = "video-title";
        title.textContent = video.title;

        const meta = document.createElement("div");
        meta.className = "video-meta";
        appendMeta(meta, video.channel);
        appendMeta(meta, compactMeta(video));

        const menu = document.createElement("span");
        menu.className = "card-menu";
        menu.textContent = "⋮";

        body.append(title, meta);
        info.append(avatar, body, menu);
        card.append(thumb, info);
        return card;
      }

      function selectVideo(video) {
        openWatchPage(video, { updateHistory: true });
      }

      function openWatchPage(video, options = {}) {
        selectedVideo = video;
        resolvedLink = "";
        document.body.classList.add("is-watch");
        feedPage.hidden = true;
        watchPage.hidden = false;
        document.title = `${video.title} - YouTube Link Frontend`;
        updateWatchUrl(video, options);
        renderWatchDetails(video);
        renderWatchRail(video);
        addWatchHistory(video);
        renderSubscribeState(video);
        stopPlayer({ keepPoster: false });
        resetQualityOptions();
        preparePlayer(video);
        window.scrollTo({ top: 0, behavior: "smooth" });
        resolveVideo(video);
        loadAvailableFormats(video);
        loadChannelDetails(video);
        loadRelatedVideos(video);
      }

      function showFeedPage(options = {}) {
        document.body.classList.remove("is-watch");
        feedPage.hidden = false;
        watchPage.hidden = true;
        document.title = "YouTube Link Frontend";
        stopPlayer();
        if (options.updateHistory) {
          const nextUrl = new URL(window.location.href);
          nextUrl.searchParams.delete("v");
          if (currentQuery) nextUrl.searchParams.set("q", currentQuery);
          window.history.pushState({}, "", nextUrl);
        }
      }

      function updateWatchUrl(video, options = {}) {
        if (!options.updateHistory) return;
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("v", video.id);
        if (currentQuery) {
          nextUrl.searchParams.set("q", currentQuery);
        } else {
          nextUrl.searchParams.delete("q");
        }
        window.history.pushState({ videoId: video.id }, "", nextUrl);
      }

      function renderWatchDetails(video) {
        watchTitle.textContent = video.title;
        watchChannel.textContent = video.channel || "YouTube";
        watchSubscribers.textContent = video.subscriberCount ? `${formatNumber(video.subscriberCount)} subscribers` : "";
        setAvatar(watchAvatar, video.channel, video.channelThumbnail);
        watchLikeCount.textContent = video.likeCount ? formatNumber(video.likeCount) : "Like";
        watchViews.textContent = video.viewCount ? `${formatNumber(video.viewCount)} views` : "";
        watchAge.textContent = video.publishedAt ? formatDate(video.publishedAt) : "";
        watchDescriptionText.textContent = video.description || video.title;
        watchSourceUrl.href = video.url;
        watchSourceUrl.textContent = video.url;
        watchCommentsTitle.textContent = `${video.commentCount ? formatNumber(video.commentCount) : "0"} Comments`;
        sampleComments.replaceChildren();
        watchOpenYoutube.href = video.url;
        disableLink(watchOpenDirect);
        watchCopy.disabled = true;
      }

      function preparePlayer(video) {
        mediaPlayer.poster = video.thumbnail || "";
        playerShell.classList.add("show-controls");
        playerShell.classList.remove("is-playing");
        playerOverlay.classList.remove("is-ready", "is-error", "is-idle");
        playerSpinner.hidden = false;
        playerStatus.textContent = "Resolving video...";
        disableLink(watchOpenDirect);
        updatePlayerState();
      }

      async function resolveVideo(video, options = {}) {
        const base = resolverBase();
        if (!base) {
          setPlayerMessage("Resolver URL is required for playback.", true);
          return;
        }

        if (resolveController) resolveController.abort();
        resolveController = new AbortController();
        const sequence = ++resolveSequence;
        resolvedLink = "";
        watchCopy.disabled = true;
        disableLink(watchOpenDirect);
        const qualityLabel = selectedQualityLabel();
        const resumeAt = options.preserveTime ? mediaPlayer.currentTime : 0;
        const shouldAutoplay = options.autoplay ?? true;
        setPlayerMessage(`Resolving ${qualityLabel}...`);

        try {
          const headers = new Headers({ "content-type": "application/json" });
          const resolverKey = resolverKeyInput.value.trim();
          if (resolverKey) headers.set("x-api-key", resolverKey);
          const body = { url: video.url };
          if (selectedFormatId) body.format_id = selectedFormatId;

          const payload = await fetchJson(`${base}/resolve`, {
            method: "POST",
            headers,
            body: JSON.stringify(body),
            signal: resolveController.signal,
          });

          if (sequence !== resolveSequence) return;
          const link = extractPlayableLink(payload);
          if (!link) {
            throw new Error("The resolver did not return a playable link.");
          }

          resolvedLink = link;
          watchOpenDirect.href = link;
          watchOpenDirect.setAttribute("aria-disabled", "false");
          watchCopy.disabled = false;
          await playResolvedLink(link, video, { resumeAt, autoplay: shouldAutoplay });
          setStatus("");
        } catch (error) {
          if (error.name === "AbortError") return;
          setPlayerMessage(error.message, true);
          setStatus(error.message, true);
        }
      }

      function extractPlayableLink(payload) {
        if (payload.direct_url) return payload.direct_url;
        if (payload.url) return payload.url;
        const streams = Array.isArray(payload.streams) ? payload.streams : [];
        const multiplexed = streams.find((stream) => stream.url && stream.vcodec !== "none" && stream.acodec !== "none");
        return multiplexed?.url || streams.find((stream) => stream.url)?.url || "";
      }

      async function loadAvailableFormats(video) {
        const base = resolverBase();
        if (!base) return;

        const sequence = ++formatsSequence;
        customQuality.disabled = true;
        setQualityOptions([], selectedFormatId);

        try {
          const headers = new Headers({ "content-type": "application/json" });
          const resolverKey = resolverKeyInput.value.trim();
          if (resolverKey) headers.set("x-api-key", resolverKey);

          const payload = await fetchJson(`${base}/formats`, {
            method: "POST",
            headers,
            body: JSON.stringify({ url: video.url }),
          });

          if (sequence !== formatsSequence || selectedVideo?.id !== video.id) return;
          availableFormats = playableQualityFormats(payload.formats || []);
          setQualityOptions(availableFormats, selectedFormatId);
        } catch {
          if (sequence !== formatsSequence) return;
          availableFormats = [];
          setQualityOptions([], "");
        }
      }

      function playableQualityFormats(formats) {
        const byHeight = new Map();
        for (const format of formats) {
          if (!format?.format_id || !format.url) continue;
          if (format.vcodec === "none" || format.acodec === "none") continue;

          const height = Number(format.height || qualityHeightFromNote(format.format_note));
          if (!height) continue;

          const key = `${height}-${format.ext || ""}`;
          const current = byHeight.get(key);
          const score = Number(format.tbr || format.vbr || format.abr || 0);
          const currentScore = Number(current?.tbr || current?.vbr || current?.abr || 0);
          if (!current || score >= currentScore) {
            byHeight.set(key, { ...format, height });
          }
        }

        return [...byHeight.values()]
          .sort((a, b) => Number(b.height || 0) - Number(a.height || 0))
          .slice(0, 8);
      }

      function setQualityOptions(formats, preferredFormatId = "") {
        const current = preferredFormatId && formats.some((format) => format.format_id === preferredFormatId)
          ? preferredFormatId
          : "";

        const options = [new Option("Auto", "")];
        for (const format of formats) {
          options.push(new Option(qualityLabel(format), format.format_id));
        }

        customQuality.replaceChildren(...options);
        customQuality.value = current;
        selectedFormatId = current;
        customQuality.disabled = formats.length === 0;
      }

      function resetQualityOptions() {
        availableFormats = [];
        selectedFormatId = "";
        customQuality.replaceChildren(new Option("Auto", ""));
        customQuality.value = "";
        customQuality.disabled = true;
      }

      function selectedQualityLabel() {
        if (!selectedFormatId) return "Auto";
        const format = availableFormats.find((item) => item.format_id === selectedFormatId);
        return format ? qualityLabel(format) : "selected quality";
      }

      function qualityLabel(format) {
        const height = Number(format.height || qualityHeightFromNote(format.format_note));
        const suffix = format.fps && Number(format.fps) > 30 ? `${Math.round(format.fps)}` : "";
        const ext = format.ext ? ` ${String(format.ext).toUpperCase()}` : "";
        return `${height || format.format_note || format.format_id}p${suffix}${ext}`;
      }

      function qualityHeightFromNote(value = "") {
        const match = String(value).match(/(\d{3,4})p?/i);
        return match ? Number(match[1]) : 0;
      }

      async function playResolvedLink(link, video, options = {}) {
        cleanupHls();
        mediaPlayer.pause();
        mediaPlayer.removeAttribute("src");
        mediaPlayer.poster = video.thumbnail || "";
        mediaPlayer.load();

        const isHls = /\.m3u8(?:[?#]|$)/i.test(link);
        if (isHls && mediaPlayer.canPlayType("application/vnd.apple.mpegurl")) {
          mediaPlayer.src = link;
        } else if (isHls && window.Hls?.isSupported()) {
          activeHls = new window.Hls({ enableWorker: true, lowLatencyMode: true });
          activeHls.loadSource(link);
          activeHls.attachMedia(mediaPlayer);
          activeHls.on(window.Hls.Events.ERROR, (_event, data) => {
            if (data?.fatal) setPlayerMessage("The resolved stream could not play in this browser.", true);
          });
        } else {
          mediaPlayer.src = link;
        }

        await new Promise((resolve) => {
          const finish = () => {
            cleanup();
            resolve();
          };
          const fail = () => {
            cleanup();
            resolve();
          };
          const cleanup = () => {
            mediaPlayer.removeEventListener("loadedmetadata", finish);
            mediaPlayer.removeEventListener("canplay", finish);
            mediaPlayer.removeEventListener("error", fail);
          };
          mediaPlayer.addEventListener("loadedmetadata", finish, { once: true });
          mediaPlayer.addEventListener("canplay", finish, { once: true });
          mediaPlayer.addEventListener("error", fail, { once: true });
          window.setTimeout(finish, 3500);
          mediaPlayer.load();
        });

        if (mediaPlayer.error) {
          setPlayerMessage("The browser could not play the resolved link.", true);
          return;
        }

        if (options.resumeAt && Number.isFinite(options.resumeAt)) {
          mediaPlayer.currentTime = Math.min(options.resumeAt, mediaPlayer.duration || options.resumeAt);
        }

        playerOverlay.classList.add("is-ready");
        updatePlayerState();
        showCustomControls();
        if (options.autoplay !== false) {
          await mediaPlayer.play().catch(() => {});
        }
      }

      function stopPlayer(options = {}) {
        if (resolveController) resolveController.abort();
        cleanupHls();
        mediaPlayer.pause();
        mediaPlayer.removeAttribute("src");
        if (!options.keepPoster) mediaPlayer.removeAttribute("poster");
        mediaPlayer.load();
        resolvedLink = "";
        updatePlayerState();
      }

      function cleanupHls() {
        if (activeHls) {
          activeHls.destroy();
          activeHls = null;
        }
      }

      function setPlayerMessage(message, isError = false) {
        playerStatus.textContent = message;
        playerOverlay.classList.remove("is-ready", "is-error", "is-idle");
        playerOverlay.classList.toggle("is-error", isError);
        playerOverlay.classList.toggle("is-idle", !message);
        playerShell.classList.add("show-controls");
      }

      async function loadChannelDetails(video) {
        const key = youtubeKeyInput.value.trim();
        if (!key || !video.channelId) return;

        try {
          const url = new URL("https://www.googleapis.com/youtube/v3/channels");
          url.search = new URLSearchParams({
            part: "snippet,statistics",
            id: video.channelId,
            key,
          }).toString();
          const payload = await fetchJson(url);
          const channel = payload.items?.[0];
          if (!channel || selectedVideo?.id !== video.id) return;
          video.channelThumbnail = bestThumbnail(channel.snippet?.thumbnails) || video.channelThumbnail;
          video.subscriberCount = Number(channel.statistics?.subscriberCount || 0);
          setAvatar(watchAvatar, video.channel, video.channelThumbnail);
          watchSubscribers.textContent = video.subscriberCount ? `${formatNumber(video.subscriberCount)} subscribers` : "";
          if (isSubscribed(video)) {
            upsertSubscription(subscriptionFromVideo(video));
            renderSubscribeState(video);
          }
        } catch {
          // Channel details are nice-to-have; search/playback should keep working without them.
        }
      }

      async function loadRelatedVideos(video) {
        const key = youtubeKeyInput.value.trim();
        const existing = currentVideos.filter((item) => item.id && item.id !== video.id);
        if (!key || existing.length >= 6) return;

        try {
          const query = currentQuery || [video.channel, simplifyTitle(video.title)].filter(Boolean).join(" ");
          const searchItems = await youtubeSearch(query || video.title, key, 12);
          const videos = await hydrateVideoDetails(searchItems, key);
          const deduped = dedupeVideos([video, ...currentVideos, ...videos]).filter((item) => item.id);
          currentVideos = deduped;
          if (selectedVideo?.id === video.id) renderWatchRail(video);
        } catch {
          // Keep the watch page usable even if related fetch fails.
        }
      }

      function renderWatchRail(video) {
        const related = dedupeVideos(currentVideos)
          .filter((item) => item.id && item.id !== video.id)
          .slice(0, 14);

        const next = related[0];
        if (next) {
          nextVideoCard.disabled = false;
          nextVideoTitle.textContent = `Next: ${next.title}`;
          nextVideoMeta.textContent = [next.channel, compactMeta(next)].filter(Boolean).join(" · ");
          nextVideoCard.onclick = () => selectVideo(next);
        } else {
          nextVideoCard.disabled = true;
          nextVideoTitle.textContent = "Next";
          nextVideoMeta.textContent = "";
          nextVideoCard.onclick = null;
        }

        const fragment = document.createDocumentFragment();
        for (const item of related) {
          fragment.append(railVideoCard(item));
        }
        watchRailList.replaceChildren(fragment);
      }

      function railVideoCard(video) {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "rail-card";
        card.addEventListener("click", () => selectVideo(video));

        const thumb = document.createElement("div");
        thumb.className = "rail-thumb";
        if (video.thumbnail) {
          const img = document.createElement("img");
          img.src = video.thumbnail;
          img.alt = "";
          img.loading = "lazy";
          thumb.append(img);
        }
        if (video.duration) {
          const duration = document.createElement("span");
          duration.className = "duration";
          duration.textContent = formatDuration(video.duration);
          thumb.append(duration);
        }

        const copy = document.createElement("div");
        copy.className = "rail-copy";

        const title = document.createElement("h3");
        title.className = "rail-title";
        title.textContent = video.title;

        const meta = document.createElement("div");
        meta.className = "rail-meta";
        appendMeta(meta, video.channel);
        appendMeta(meta, compactMeta(video));

        const menu = document.createElement("span");
        menu.className = "rail-menu";
        menu.textContent = "⋮";

        copy.append(title, meta);
        card.append(thumb, copy, menu);
        return card;
      }

      async function loadSuggestions(query) {
        const requestId = ++latestSuggestionRequest;
        try {
          const suggestions = await youtubeSuggestions(query);
          if (requestId !== latestSuggestionRequest || queryInput.value.trim() !== query) return;
          renderSuggestions(suggestions);
        } catch {
          closeSuggestions();
        }
      }

      function youtubeSuggestions(query) {
        return new Promise((resolve, reject) => {
          const callbackName = `__ytSuggest${Date.now()}${Math.random().toString(36).slice(2)}`;
          const script = document.createElement("script");
          const timeout = window.setTimeout(() => {
            cleanup();
            reject(new Error("suggestions timed out"));
          }, 6000);

          window[callbackName] = (payload) => {
            cleanup();
            const rawSuggestions = Array.isArray(payload?.[1]) ? payload[1] : [];
            resolve(rawSuggestions.map((item) => Array.isArray(item) ? item[0] : item).filter(Boolean));
          };

          script.onerror = () => {
            cleanup();
            reject(new Error("suggestions failed"));
          };

          script.src = `https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&callback=${callbackName}&q=${encodeURIComponent(query)}`;
          document.head.append(script);

          function cleanup() {
            window.clearTimeout(timeout);
            script.remove();
            delete window[callbackName];
          }
        });
      }

      function renderSuggestions(suggestions) {
        const unique = [...new Set(suggestions)].slice(0, 10);
        if (!unique.length) {
          closeSuggestions();
          return;
        }

        const fragment = document.createDocumentFragment();
        for (const suggestion of unique) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "suggestion";
          button.role = "option";
          button.textContent = suggestion;
          button.addEventListener("click", () => {
            queryInput.value = suggestion;
            closeSuggestions();
            searchYouTube(suggestion);
          });
          fragment.append(button);
        }

        suggestionsEl.replaceChildren(fragment);
        suggestionsEl.classList.add("is-open");
      }

      function closeSuggestions() {
        suggestionsEl.classList.remove("is-open");
        suggestionsEl.replaceChildren();
      }

      function hydrateInputs() {
        youtubeKeyInput.value = params.get("ytKey")
          || runtimeConfig.youtubeApiKey
          || window.localStorage.getItem(storageNames.youtubeKey)
          || "";
        resolverBaseInput.value = params.get("api")
          || runtimeConfig.resolverBase
          || window.localStorage.getItem(storageNames.resolverBase)
          || "http://127.0.0.1:10001";
        resolverKeyInput.value = params.get("apiKey")
          || runtimeConfig.resolverKey
          || window.localStorage.getItem(storageNames.resolverKey)
          || "";
      }

      function persistInputs() {
        window.localStorage.setItem(storageNames.youtubeKey, youtubeKeyInput.value.trim());
        window.localStorage.setItem(storageNames.resolverBase, resolverBaseInput.value.trim());
        window.localStorage.setItem(storageNames.resolverKey, resolverKeyInput.value.trim());
      }

      function setBusy(isBusy) {
        searchButton.disabled = isBusy;
        queryInput.disabled = isBusy;
      }

      function setStatus(message, isError = false) {
        statusText.textContent = message;
        statusText.classList.toggle("error", isError);
      }

      function resolverBase() {
        return resolverBaseInput.value.trim().replace(/\/+$/, "");
      }

      function disableLink(link) {
        link.removeAttribute("href");
        link.setAttribute("aria-disabled", "true");
      }

      function appendMeta(parent, value) {
        if (!value) return;
        const span = document.createElement("span");
        span.textContent = value;
        parent.append(span);
      }

      function compactMeta(video) {
        const parts = [];
        if (video.viewCount) parts.push(`${formatNumber(video.viewCount)} views`);
        if (video.publishedAt) parts.push(formatDate(video.publishedAt));
        return parts.join(" · ");
      }

      function videoFromSearchItem(item) {
        const id = item.id?.videoId || "";
        const snippet = item.snippet || {};
        return {
          id,
          title: decodeEntities(snippet.title || "Untitled video"),
          channel: decodeEntities(snippet.channelTitle || ""),
          publishedAt: snippet.publishedAt || "",
          thumbnail: bestThumbnail(snippet.thumbnails),
          url: youtubeUrl(id),
          description: decodeEntities(snippet.description || ""),
          channelId: snippet.channelId || "",
        };
      }

      function videoFromDetails(item, fallback) {
        const snippet = item.snippet || {};
        return {
          ...fallback,
          title: decodeEntities(snippet.title || fallback.title),
          channel: decodeEntities(snippet.channelTitle || fallback.channel),
          publishedAt: snippet.publishedAt || fallback.publishedAt,
          thumbnail: bestThumbnail(snippet.thumbnails) || fallback.thumbnail,
          description: decodeEntities(snippet.description || fallback.description || ""),
          channelId: snippet.channelId || fallback.channelId || "",
          duration: parseIsoDuration(item.contentDetails?.duration),
          viewCount: Number(item.statistics?.viewCount || 0),
          likeCount: Number(item.statistics?.likeCount || 0),
          commentCount: Number(item.statistics?.commentCount || 0),
        };
      }

      function bestThumbnail(thumbnails = {}) {
        return thumbnails.maxres?.url
          || thumbnails.standard?.url
          || thumbnails.high?.url
          || thumbnails.medium?.url
          || thumbnails.default?.url
          || "";
      }

      function youtubeUrl(id) {
        return id ? `https://www.youtube.com/watch?v=${id}` : "";
      }

      function initials(value) {
        return String(value || "YT").trim().slice(0, 2);
      }

      function setAvatar(element, label, imageUrl = "") {
        element.textContent = imageUrl ? "" : initials(label);
        element.style.backgroundImage = imageUrl ? `url("${imageUrl}")` : "";
        element.style.backgroundSize = imageUrl ? "cover" : "";
        element.style.backgroundPosition = imageUrl ? "center" : "";
      }

      function formatDate(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        const diffMs = Date.now() - date.getTime();
        const days = Math.max(1, Math.floor(diffMs / 86400000));
        if (days < 30) return `${days} days ago`;
        const months = Math.floor(days / 30);
        if (months < 12) return `${months} months ago`;
        return `${Math.floor(months / 12)} years ago`;
      }

      function formatNumber(value) {
        return new Intl.NumberFormat(undefined, { notation: "compact" }).format(value);
      }

      function parseIsoDuration(value = "") {
        const match = /^PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?$/.exec(value);
        if (!match) return 0;
        const hours = Number(match[1] || 0);
        const minutes = Number(match[2] || 0);
        const seconds = Number(match[3] || 0);
        return hours * 3600 + minutes * 60 + seconds;
      }

      function formatDuration(totalSeconds) {
        const seconds = Number(totalSeconds);
        if (!Number.isFinite(seconds) || seconds <= 0) return "0:00";

        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const rest = Math.floor(seconds % 60).toString().padStart(2, "0");
        if (hours) return `${hours}:${minutes.toString().padStart(2, "0")}:${rest}`;
        return `${minutes}:${rest}`;
      }

      function decodeEntities(value) {
        const textarea = document.createElement("textarea");
        textarea.innerHTML = value;
        return textarea.value;
      }

      function dedupeVideos(videos) {
        const seen = new Set();
        const output = [];
        for (const video of videos) {
          if (!video?.id || seen.has(video.id)) continue;
          seen.add(video.id);
          output.push(video);
        }
        return output;
      }

      function loadStoredList(key) {
        try {
          const parsed = JSON.parse(window.localStorage.getItem(key) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function saveStoredList(key, value) {
        window.localStorage.setItem(key, JSON.stringify(value));
      }

      function simplifyTitle(title) {
        return String(title || "")
          .replace(/\([^)]*\)/g, " ")
          .replace(/\[[^\]]*\]/g, " ")
          .replace(/\bofficial\b|\bvideo\b|\blyric\b|\bHD\b/gi, " ")
          .replace(/\s+/g, " ")
          .trim()
          .slice(0, 90);
      }

      async function copyText(value) {
        const text = String(value || "").trim();
        if (!text) return;
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.style.position = "fixed";
          textarea.style.opacity = "0";
          document.body.append(textarea);
          textarea.select();
          document.execCommand("copy");
          textarea.remove();
        }
        setStatus("Copied.");
      }

      const initialQuery = params.get("q");
      const initialVideoId = params.get("v");
      if (initialVideoId) {
        if (initialQuery) {
          queryInput.value = initialQuery;
          currentQuery = initialQuery;
        }
        openVideoFromId(initialVideoId, { updateHistory: false });
      } else if (initialQuery) {
        queryInput.value = initialQuery;
        searchYouTube(initialQuery, { updateHistory: false });
      } else if (youtubeKeyInput.value.trim()) {
        loadHomeFeed(true);
      }
    </script>
  </body>
</html>
