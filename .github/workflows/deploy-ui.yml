# Requires GitHub Actions billing. If your account is locked, use docs/ + branch deploy instead.
# See RUNBOOK.md "Host The UI On GitHub Pages".

name: Deploy UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - ".github/workflows/deploy-ui.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend config
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const defaultResolverBase = "https://organic-space-goggles-4jwg4v79r5rpc5qg5-10000.app.github.dev";
          function normalizeResolverBase(value) {
            const raw = String(value || "").trim();
            if (!raw) return "";
            try {
              const url = new URL(raw);
              url.hash = "";
              url.search = "";
              url.pathname = url.pathname
                .replace(/\/+(channels\/(?:search|videos)|resolve|formats|playlist|stream|search|docs|health)\/?$/i, "")
                .replace(/\/+$/, "");
              return url.toString().replace(/\/+$/, "");
            } catch {
              return raw
                .replace(/\/+(channels\/(?:search|videos)|resolve|formats|playlist|stream|search|docs|health)\/?$/i, "")
                .replace(/\/+$/, "");
            }
          }
          const config = {
            youtubeApiKey: process.env.YOUTUBE_API_KEY || "",
            resolverBase: normalizeResolverBase(process.env.RESOLVER_URL || defaultResolverBase),
            resolverKey: process.env.RESOLVER_API_KEY || "",
            googleClientId: process.env.GOOGLE_CLIENT_ID || "",
          };
          const body = `window.YT_FRONTEND_CONFIG = ${JSON.stringify(config, null, 2)};\n`;
          fs.writeFileSync("ui/config.js", body);
          NODE
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RESOLVER_URL: ${{ secrets.RESOLVER_URL }}
          RESOLVER_API_KEY: ${{ secrets.RESOLVER_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
