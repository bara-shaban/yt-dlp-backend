name: Deploy UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "ui/**"
      - ".github/workflows/deploy-ui.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bake frontend config into docs/
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          RESOLVER_URL: ${{ secrets.RESOLVER_URL }}
          RESOLVER_API_KEY: ${{ secrets.RESOLVER_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          function normalizeResolverBase(value) {
            const raw = String(value || "").trim();
            if (!raw) return "";
            const stripEndpoint = (p) =>
              p.replace(/\/+(channels\/(?:search|videos)|resolve|formats|playlist|stream|search|docs|health)\/?$/i, "")
               .replace(/\/+$/, "");
            try {
              const url = new URL(raw);
              url.hash = "";
              url.search = "";
              url.pathname = stripEndpoint(url.pathname);
              return url.toString().replace(/\/+$/, "");
            } catch {
              return stripEndpoint(raw);
            }
          }

          const config = {
            youtubeApiKey: process.env.YOUTUBE_API_KEY || "",
            resolverBase: normalizeResolverBase(process.env.RESOLVER_URL || ""),
            resolverKey: process.env.RESOLVER_API_KEY || "",
            googleClientId: process.env.GOOGLE_CLIENT_ID || "",
          };

          const body = `window.YT_FRONTEND_CONFIG = ${JSON.stringify(config, null, 2)};\n`;
          fs.writeFileSync("docs/config.js", body);

          const present = Object.fromEntries(
            Object.entries(config).map(([k, v]) => [k, v ? "set" : "empty"])
          );
          console.log("Baked docs/config.js:", present);
          NODE

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
